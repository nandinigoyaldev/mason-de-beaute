<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Maison de Beauté</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <link rel="apple-touch-icon" href="assets/images/logo.png">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            background: radial-gradient(circle at center, #2e022e 0%, #000 100%);
            font-family: system-ui, -apple-system, sans-serif;
            color: white;
            margin: 0;
            padding: 1rem;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), 0 0 15px rgba(160, 32, 240, 0.2);
            text-align: center;
        }
        .login-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: white;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .login-card p {
            color: #aaa;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: #ddd;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 0.85rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .form-group input:focus {
            border-color: #a020f0;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 8px rgba(160, 32, 240, 0.4);
        }
        .login-btn {
            width: 100%;
            padding: 0.9rem;
            background: purple;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .login-btn:hover {
            background: #a020f0;
            box-shadow: 0 0 15px rgba(160, 32, 240, 0.6);
            transform: translateY(-2px);
        }
        .error-message {
            color: #ff4a4a;
            font-size: 0.9rem;
            margin-top: 1rem;
            min-height: 20px;
            display: none;
            background: rgba(255, 74, 74, 0.1);
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 74, 74, 0.2);
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Maison de Beauté</h2>
        <p>Salon Administration Portal</p>
        
        <!-- Showcase Demo Credentials -->
        <div style="background: rgba(252,211,77,0.08); border: 1px solid rgba(252, 211, 77, 0.25); padding: 1rem; border-radius: 10px; font-size: 0.85rem; color: #fcd34d; margin-bottom: 2rem; text-align: left; line-height: 1.5; backdrop-filter: blur(5px);">
            <div style="font-weight: 700; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 6px;">
                <span style="font-size: 1rem;">✨</span> Showcase Demo Portal:
            </div>
            Username: <code style="background: rgba(0,0,0,0.4); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; color: white; border: 1px solid rgba(255,255,255,0.1);">admin</code><br>
            Password: <code style="background: rgba(0,0,0,0.4); padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; color: white; border: 1px solid rgba(255,255,255,0.1);">Password123</code><br>
            <div style="font-size: 0.75rem; opacity: 0.85; margin-top: 0.5rem; border-top: 1px solid rgba(252,211,77,0.15); padding-top: 0.4rem;">
                Note: Administrative database edits are disabled in Demo Mode to protect the showcase.
            </div>
        </div>
        
        <form id="login-form">
            <div class="form-group">
                <label for="username">USERNAME</label>
                <input type="text" id="username" name="username" placeholder="Enter admin username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <label for="password" style="margin-bottom: 0;">PASSWORD</label>
                    <button type="button" id="toggle-password-btn" style="background: none; border: none; color: #a855f7; font-size: 0.8rem; font-weight: 700; cursor: pointer; padding: 0; outline: none; transition: color 0.2s;">SHOW</button>
                </div>
                <input type="password" id="password" name="password" placeholder="Enter account password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="login-btn">LOG IN</button>
            <div id="error-box" class="error-message"></div>
        </form>
        
        <a href="/" class="back-link">← Return to Main Site</a>
    </div>

    <script>
        // Show/Hide Password Toggle Logic
        const togglePasswordBtn = document.getElementById("toggle-password-btn");
        const passwordInput = document.getElementById("password");
        if (togglePasswordBtn && passwordInput) {
            togglePasswordBtn.addEventListener("click", () => {
                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                    togglePasswordBtn.textContent = "HIDE";
                } else {
                    passwordInput.type = "password";
                    togglePasswordBtn.textContent = "SHOW";
                }
            });
        }

        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const errorBox = document.getElementById("error-box");
            
            errorBox.style.display = "none";
            errorBox.textContent = "";

            try {
                const response = await fetch("/api/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Redirect to the dashboard
                    window.location.href = "admin.html";
                } else {
                    errorBox.textContent = data.error || "Login failed. Please check credentials.";
                    errorBox.style.display = "block";
                }
            } catch (err) {
                console.error("Login request failed:", err);
                errorBox.textContent = "Unable to connect to server. Please try again.";
                errorBox.style.display = "block";
            }
        });

        // Auto redirect if already logged in
        (async () => {
            try {
                const res = await fetch("/api/admin/status");
                const data = await res.json();
                if (data.loggedIn) {
                    window.location.href = "admin.html";
                }
            } catch (e) {
                console.error(e);
            }
        })();
    </script>
</body>
</html>
